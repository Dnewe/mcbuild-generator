#-----------------#
# HYPERPARAMETERS #
#-----------------#


### EXTRACTION PIPELINE
extraction:
  data_dir: 'data/01_raw/schem/'    # path to directory containing building files (.schem, ...)
  max_files: -1                   # maximum number of files 

### PROCESSING PIPELINE
processing:
  use_cache: True
  multiprocessing: True

  cleaning:
    min_w: 4
    min_h: 4
    min_l: 4
    max_w: 48
    max_h: 48
    max_l: 48

  transformation:
    filter: True
    rare_variants_thresh: 0.4
    proportion_level: 'block'

training:
  train_val_split: [0.8, 0.2]
  epochs: 3
  lr: 0.001
  batch_size: 4
  embed_dim: 32