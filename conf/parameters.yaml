#-----------------#
# HYPERPARAMETERS #
#-----------------#

run_name: 'full_max64'


### EXTRACTION PIPELINE
extraction:
  use_cache: True
  multiprocessing: True

  data_dir: 'data/01_raw/schem/'    # path to directory containing building files (.schem, ...)
  max_files: -1                   # maximum number of files to extract (-1: not limit)


### PROCESSING PIPELINE
processing:
  use_cache: False
  multiprocessing: True

  build_filter:
    max_files: -1   # maximum number of files after cleaning (-1: not limit)
    outlier_cols_thresh: {}  # "volume", "width", "length", "height", "palettemax"
    min_w: 16
    min_h: 16
    min_l: 16
    max_w: 80
    max_h: 80
    max_l: 80

  block_filter:
    min_use_count_block: 100 
    min_use_count_build: 10
    rare_variants_thresh: 0.1
    proportion_level: 'block'


### TRAINING PIPELINE
training:
  dataset:
    train_val_split: [0.8, 0.2]
    batch_size: 1
    num_workers: 0

  model:
    use_pretrained: False
    pretrained_fp: ''
    latent_channels: 64
    embed_dim: 64
    pad_block: 'minecraft:air'
  
  loss:
    ce_block_weights: {"air":0.1, "dirt":0.2, "sand":0.2, "water[level=0]":0.2, "stone":0.2, "diorite":0.1, "andesite":0.1, "granite":0.1}
    kl_start: 0.0 
    kl_end: 1.0
    kl_anneal_step: 5000

  train:
    epochs: 10
    lr: 0.0001


### VALIDATION PIPELINE
validation:
  generate:
    n_builds: 8

  reconstruct:
    n_builds: 8