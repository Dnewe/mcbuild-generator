#-----------------#
# HYPERPARAMETERS #
#-----------------#

run_name: 'full_max64'


### EXTRACTION PIPELINE
extraction:
  data_dir: 'data/01_raw/schem/'    # path to directory containing building files (.schem, ...)
  max_files: -1                   # maximum number of files to extract (-1: not limit)

### PROCESSING PIPELINE
processing:
  use_cache: False
  multiprocessing: True

  cleaning:
    max_files: -1   # maximum number of files after cleaning (-1: not limit)
    outliers_cols: ["volume", "width", "length", "height", "palettemax"]
    outliers_thresh_coeff: [5, 5, 5, 10, 3]
    min_w: 32
    min_h: 32
    min_l: 32
    max_w: 96
    max_h: 96
    max_l: 96

  transformation:
    filter: True
    rare_variants_thresh: 0.2
    proportion_level: 'block'


training:
  dataset:
    train_val_split: [0.8, 0.2]
    batch_size: 2
    num_workers: 4

  model:
    use_pretrained: False
    pretrained_fp: ''
    latent_channels: 128
    embed_dim: 64
  
  loss:
    air_weight: 0.05 
    kl_start: 0. 
    kl_end: 2.0
    kl_anneal_step: 5000

  train:
    epochs: 10
    lr: 0.003

  
validation:
  []